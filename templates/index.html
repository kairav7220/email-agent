<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Email Support Agent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .email-card { margin-bottom: 20px; }
        .email-body { white-space: pre-wrap; background: #fff; padding: 10px; border-radius: 5px; }
        textarea { width: 100%; min-height: 120px; }
    </style>
</head>
<body class="container py-4">
    <h1 class="mb-4">📧 AI-Powered Email Support Agent</h1>

    {% if emails %}
    {% for email_id, email in emails.items() %}
            <div class="card email-card">
                <div class="card-header">
                    <strong>From:</strong> {{ email.from }} | 
                    <strong>Subject:</strong> {{ email.subject }}
                </div>
                <div class="card-body" id="email-{{ loop.index }}">
                    <h6>Message:</h6>
                    <div class="email-body">{{ email.body }}</div>

                    <h6 class="mt-3">Draft Reply:</h6>
                    <input type="hidden" name="to" value="{{ email.from }}">
                    <input type="hidden" name="subject" value="{{ email.subject }}">
                    <input type="hidden" name="body" value="{{ email.body }}">
                    <textarea name="reply" id="reply-{{ loop.index }}">{{ email.draft }}</textarea>
                    <div class="mt-3">
                        <button class="btn btn-success" data-index="{{ loop.index }}" data-id="{{ email.id }}" onclick="sendEmail(this.dataset.index, this.dataset.id)">✅ Send Reply </button>
                    </div>
                    <div class="status" id="status-{{ loop.index }}"></div>
                </div>
            </div>
        {% endfor %}
    {% else %}
        <p>No unread emails 🎉</p>
    {% endif %}
    
    <script>
        async function sendEmail(index, emailId) {
            const reply = document.getElementById(`reply-${index}`).value;
            const status = document.getElementById(`status-${index}`);
            status.innerText = "Sending...";
            
            const response = await fetch("/send-email", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email_id: emailId, reply: reply })
            });
            
            const data = await response.json();
            status.innerText = data.message;
        }
    </script>
